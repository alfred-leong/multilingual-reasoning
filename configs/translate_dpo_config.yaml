# =============================================================================
# Translate-DPO Experiment Configuration
#
# Pipeline:
#   1. Generate English + Native responses for MMMLU (Qwen3-1.7B, thinking mode)
#   2. Translate English responses to native language (TranslateGemma)
#   3. DPO training: chosen = translated, rejected = native
#   4. Evaluate on MGSM: accuracy + native language ratio
# =============================================================================

languages:
  - code: "JA_JP"
    name: "Japanese"
    mgsm_split: "ja"
  - code: "BN_BD"
    name: "Bengali"
    mgsm_split: "bn"
  - code: "SW_KE"
    name: "Swahili"
    mgsm_split: "sw"

datasets:
  preference_source: "openai/MMMLU"
  english_source: "cais/mmlu"
  mgsm_local_dir: "/external1/alfred/datasets/ml-delta-reasoning"

models:
  generation_model: "Qwen/Qwen3-1.7B"
  translation_model: "google/translategemma-4b-it"
  base_model: "Qwen/Qwen3-1.7B"

generation:
  max_tokens: 2048
  temperature: 0.6
  top_p: 0.95

translation:
  max_tokens: 2048
  temperature: 0.3
  top_p: 0.95

dpo:
  learning_rate: 5e-7
  beta: 0.1
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  max_length: 4096

vllm_ports:
  generation: 8300
  translation: 8400
